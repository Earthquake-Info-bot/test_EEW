const areaOrderIndex = new Map(
  AREA_ORDER.map((name, idx) => [name, idx])
);

function sortByAreaOrder(a, b) {
  const ia = areaOrderIndex.has(a) ? areaOrderIndex.get(a) : Infinity;
  const ib = areaOrderIndex.has(b) ? areaOrderIndex.get(b) : Infinity;
  return ia - ib;
}

function nowTimeFormat() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  const h = String(now.getHours()).padStart(2,'0');
  const min = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  const format = `${y}/${m}/${d} ${h}:${min}:${s}`;
  return format;
}

function announceTimeFormat(time) {
  if (!time) return "----/--/-- --:--:--";
  const [datePart, timePart] = time.split(" ");
  if (!datePart || !timePart) return "----/--/-- --:--:--";
  const [y, m, d] = datePart.split("/").map(Number);
  const [h, min, s] = timePart.split(":").map(Number);
  if ([y, m, d, h, min, s].some(v => isNaN(v))) {
    return "----/--/-- --:--:--";
  }
  return `${y}/${String(m).padStart(2,'0')}/${String(d).padStart(2,'0')} ${String(h).padStart(2,'0')}:${String(min).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
  
let running = false;
async function updateEEW() {
  if (running) return;
  running = true;
  try {
    //const res = await fetch("https://api.wolfx.jp/jma_eew.json");
    const res = await fetch("https://api-v2-sandbox.p2pquake.net/v2/history?codes=556&limit=1");
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    const serial = data[0].issue.serial;

    let eewMessage = "";

    if (data[0].test === true) {
      eewMessage += "◆◆◆これは緊急地震速報の訓練報です。誤解される可能性のある再配信はご遠慮ください◆◆◆\n"
    }
    
    if (data[0].cancelled === true) {
      eewMessage += "【緊急地震速報（取消）】\n＜キャンセル報＞\nこの緊急地震速報は取り消されました。強い揺れの心配はありません。";
    } else {
      eewMessage += `【緊急地震速報（第${serial}報）】`;
    } 

    outputEl.textContent = eewMessage;

    const now = nowTimeFormat();
    const announceTime = announceTimeFormat(new Date(data[0].time));
    
    statusEl.textContent = `最終更新: ${now}\n発表時刻: ${announceTime}`;
    
  } catch(e) {
    outputEl.textContent = "取得エラー: " + e.message + (e.stack ? "\n" + e.stack : "");
  }
  running = false;
}

updateEEW();
setInterval(updateEEW, 1000);
