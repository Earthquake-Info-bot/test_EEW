function nowTimeFormat() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  const h = String(now.getHours()).padStart(2,'0');
  const min = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  const format = `${y}/${m}/${d} ${h}:${min}:${s}`;
  return format;
}
  
let running = false;
async function updateEEW() {
  if (running) return;
  running = true;
  try {
    //const res = await fetch("https://api.wolfx.jp/jma_eew.json");
    const res = await fetch("https://api-v2-sandbox.p2pquake.net/v2/history?codes=556&limit=1");
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    const serial = data[0].issue.serial;

    let eewMessage = "";

    if (data[0].test === true) {
      eewMessage += "◆◆◆これは緊急地震速報の訓練報です。誤解される可能性のある再配信はご遠慮ください◆◆◆\n"
    }
    
    if (data[0].cancelled === true) {
      eewMessage += "【緊急地震速報（取消）】\n＜キャンセル報＞\nこの緊急地震速報は取り消されました。強い揺れの心配はありません。";
    } else {
      eewMessage += `【緊急地震速報（第${serial}報）】`;
      eewMessage += `\n落ち着いて身の安全を確保\n\n＜強い揺れが予想される地域＞\n`;

      const areas = [];
      for (const area of data[0].areas) {
        areas.push(area.name);
      }

      eewMessage += areas.join("　");

      const hypocenter = data[0].earthquake.hypocenter.reduceName;
      eewMessage += `\n\n◎${hypocenter}で地震、強い揺れに警戒。姿勢を低くして頭を守り、揺れがおさまるまで安全な場所で待つこと。`;
    } 

    outputEl.textContent = eewMessage;

    const now = nowTimeFormat();
    const announceTime = data[0].time;
    
    statusEl.textContent = `最終更新: ${now}\n発表時刻: ${announceTime}`;
    
  } catch(e) {
    outputEl.textContent = "取得エラー: " + e.message + (e.stack ? "\n" + e.stack : "");
  }
  running = false;
}

updateEEW();
setInterval(updateEEW, 1000);

// コピー機能
copyBtn.addEventListener("click", () => {

  navigator.clipboard.writeText(text).then(() => {

    }, 1000);
  }).catch(err => {
    alert("コピーに失敗しました: " + err);

});
